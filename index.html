<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BT Key Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d14; --sur:#13131e; --sur2:#1a1a28;
  --bdr:#2a2a3e; --txt:#f0f0f8; --muted:#5050a0;
  --accent:#5b8dee; --green:#2ecc71; --orange:#f5a400;
  --red:#e74c3c; --gold:#f4c430;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--txt);
  min-height:100dvh;
  display:flex; flex-direction:column;
  align-items:center; padding:16px;
  gap:14px; overflow-y:auto;
}
h1 { font-size:1.3rem; font-weight:900; color:var(--gold); letter-spacing:2px; text-align:center; }
.sub { font-size:0.75rem; color:var(--muted); text-align:center; margin-top:-6px; }

/* ── 토글 ── */
.toggle-wrap { width:100%; max-width:600px; }
.toggle-btn {
  width:100%; padding:14px;
  font-family:'Noto Sans KR',sans-serif; font-size:1.05rem; font-weight:900;
  border-radius:14px; border:2px solid var(--bdr);
  cursor:pointer; transition:all .2s; letter-spacing:1px;
}
.toggle-btn.off { background:var(--sur2); color:var(--muted); border-color:var(--bdr); }
.toggle-btn.on  { background:rgba(46,204,113,.15); color:var(--green); border-color:var(--green); animation:breathe 2s ease-in-out infinite; }
@keyframes breathe {
  0%,100%{ box-shadow:0 0 0 0 rgba(46,204,113,.3); }
  50%    { box-shadow:0 0 0 10px rgba(46,204,113,.0); }
}
.status-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; background:var(--muted); transition:background .3s; }
.on .status-dot { background:var(--green); box-shadow:0 0 6px var(--green); }

/* ── 입력창 (BT 수신용) ── */
.input-area {
  width:100%; max-width:600px;
  background:var(--sur2); border:2px dashed var(--bdr);
  border-radius:12px; padding:0; position:relative; overflow:hidden;
  transition:border-color .2s;
}
.input-area.active { border-color:var(--accent); }
.input-area input {
  width:100%; background:transparent; border:none; outline:none;
  color:var(--txt); font-family:'JetBrains Mono',monospace;
  font-size:1rem; padding:14px 16px; text-align:center;
  caret-color:var(--accent);
}
.input-area input::placeholder { color:var(--muted); font-size:0.85rem; }
.input-hint { font-size:0.68rem; color:var(--muted); text-align:center; padding:0 16px 10px; }

/* ── 디스플레이 ── */
.display-box {
  width:100%; max-width:600px;
  background:var(--sur); border:2px solid var(--bdr);
  border-radius:16px; padding:14px 18px;
  display:flex; flex-direction:column; gap:9px;
}
.d-row { display:grid; grid-template-columns:88px 1fr; align-items:center; gap:10px; }
.d-lbl { font-size:0.66rem; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.d-val {
  font-family:'JetBrains Mono',monospace; font-size:0.95rem; font-weight:700;
  background:var(--sur2); border:1px solid var(--bdr);
  border-radius:8px; padding:6px 12px; min-height:36px;
  display:flex; align-items:center; word-break:break-all; transition:all .15s;
}
.d-val.fb { border-color:var(--accent); animation:fblue .25s ease-out; }
.d-val.fg { border-color:var(--green);  animation:fgreen .25s ease-out; }
@keyframes fblue  { from { background:rgba(91,141,238,.4); } to { background:rgba(91,141,238,.08); } }
@keyframes fgreen { from { background:rgba(46,204,113,.4); } to { background:rgba(46,204,113,.08); } }

.badge { display:inline-block; padding:3px 10px; border-radius:14px; font-size:0.72rem; font-weight:700; }
.badge.wait  { background:var(--sur2); color:var(--muted); border:1px solid var(--bdr); }
.badge.yes   { background:rgba(46,204,113,.2); color:var(--green); border:1px solid var(--green); }
.badge.no    { background:rgba(245,164,0,.15); color:var(--orange); border:1px solid var(--orange); }

/* ── 로그 ── */
.log-box { width:100%; max-width:600px; background:var(--sur); border:1px solid var(--bdr); border-radius:14px; overflow:hidden; }
.log-hdr { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; border-bottom:1px solid var(--bdr); font-size:0.72rem; font-weight:700; color:var(--muted); }
.log-hdr .cnt { color:var(--accent); }
.clr-btn { background:none; border:1px solid var(--bdr); color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:0.66rem; padding:2px 9px; border-radius:6px; cursor:pointer; }
.clr-btn:active { border-color:var(--red); color:var(--red); }
.log-list { max-height:240px; overflow-y:auto; }
.log-empty { padding:18px; text-align:center; color:var(--muted); font-size:0.78rem; }
.log-item { display:grid; grid-template-columns:34px 1fr 1fr 62px 50px; align-items:center; gap:5px; padding:5px 14px; border-bottom:1px solid rgba(255,255,255,.03); font-size:0.7rem; }
.log-item:last-child { border-bottom:none; }
.l-n  { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.64rem; }
.l-k  { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.l-c  { font-family:'JetBrains Mono',monospace; color:var(--txt); font-size:0.65rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.l-kc { font-family:'JetBrains Mono',monospace; color:var(--orange); font-size:0.65rem; }
.l-m  { font-weight:700; }
.l-m.y { color:var(--green); }
.l-m.n { color:var(--muted); }

/* ── 필터 ── */
.filter-row { display:flex; flex-wrap:wrap; gap:6px; width:100%; max-width:600px; align-items:center; }
.f-lbl { font-size:0.68rem; font-weight:700; color:var(--muted); }
.chip { background:var(--sur2); border:1px solid var(--bdr); color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:0.68rem; font-weight:700; padding:4px 11px; border-radius:14px; cursor:pointer; transition:all .2s; }
.chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── 참조표 — 스크롤 가능 ── */
.ref-box { width:100%; max-width:600px; background:var(--sur); border:1px solid var(--bdr); border-radius:14px; overflow:hidden; }
.ref-hdr { padding:8px 14px; border-bottom:1px solid var(--bdr); font-size:0.72rem; font-weight:700; color:var(--muted); }
/* 가로 스크롤 테이블 */
.ref-scroll { overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch; }
.ref-table {
  width:100%; min-width:520px; border-collapse:collapse;
}
.ref-table thead tr { background:var(--sur2); }
.ref-table th { padding:7px 12px; font-size:0.66rem; font-weight:700; color:var(--muted); text-align:left; letter-spacing:1px; border-bottom:1px solid var(--bdr); white-space:nowrap; }
.ref-table td { padding:6px 12px; font-size:0.72rem; border-bottom:1px solid rgba(255,255,255,.04); white-space:nowrap; }
.ref-table tr:last-child td { border-bottom:none; }
.ref-table tr.hit td { background:rgba(46,204,113,.15); animation:rhit .4s ease-out; }
.ref-table tr:hover td { background:var(--sur2); cursor:pointer; }
@keyframes rhit { from { background:rgba(46,204,113,.5); } }
.td-key  { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent); }
.td-code { font-family:'JetBrains Mono',monospace; color:var(--txt); }
.td-kc   { font-family:'JetBrains Mono',monospace; color:var(--orange); }

::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }
</style>
</head>
<body>

<h1>🔵 BT Key Picker</h1>
<p class="sub">블루투스 장치의 키값을 수집합니다 (매핑 없는 값도 모두 기록)</p>

<!-- 캡처 ON/OFF -->
<div class="toggle-wrap">
  <button class="toggle-btn off" id="toggleBtn" onclick="toggleCapture()">
    <span class="status-dot"></span>캡처 시작 (탭하여 활성화)
  </button>
</div>

<!-- 텍스트 입력창 — BT 장치 입력 수신 -->
<div class="input-area" id="inputArea">
  <input type="text" id="btInput"
    placeholder="📱 여기를 탭 → BT 버튼 눌러보세요 (입력값도 수집)"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
    oninput="onInputEvt(event)"
    onfocus="document.getElementById('inputArea').classList.add('active')"
    onblur="document.getElementById('inputArea').classList.remove('active')">
  <div class="input-hint">일부 BT 장치는 keydown 없이 텍스트만 전송합니다 → input 이벤트로 수집</div>
</div>

<!-- 디스플레이 -->
<div class="display-box">
  <div class="d-row"><span class="d-lbl">key</span>     <div class="d-val" id="dKey"><span style="color:var(--muted)">—</span></div></div>
  <div class="d-row"><span class="d-lbl">code</span>    <div class="d-val" id="dCode"><span style="color:var(--muted)">—</span></div></div>
  <div class="d-row"><span class="d-lbl">keyCode</span> <div class="d-val" id="dKC"><span style="color:var(--muted)">—</span></div></div>
  <div class="d-row"><span class="d-lbl">which</span>   <div class="d-val" id="dWhich"><span style="color:var(--muted)">—</span></div></div>
  <div class="d-row"><span class="d-lbl">inputData</span><div class="d-val" id="dInput"><span style="color:var(--muted)">—</span></div></div>
  <div class="d-row"><span class="d-lbl">type</span>    <div class="d-val" id="dType"><span style="color:var(--muted)">—</span></div></div>
  <div class="d-row"><span class="d-lbl">매핑 일치</span><div class="d-val" id="dMatch"><span class="badge wait">대기 중</span></div></div>
</div>

<!-- 필터 -->
<div class="filter-row">
  <span class="f-lbl">이벤트:</span>
  <button class="chip on"  data-type="keydown"  onclick="toggleFilter(this)">keydown</button>
  <button class="chip on"  data-type="keyup"    onclick="toggleFilter(this)">keyup</button>
  <button class="chip"     data-type="keypress" onclick="toggleFilter(this)">keypress</button>
  <button class="chip on"  data-type="input"    onclick="toggleFilter(this)">input</button>
</div>

<!-- 로그 -->
<div class="log-box">
  <div class="log-hdr">
    📋 로그 <span class="cnt" id="logCnt">0</span>건
    <button class="clr-btn" onclick="clearLog()">전체 삭제</button>
  </div>
  <div class="log-list" id="logList">
    <div class="log-empty">캡처 ON 후 블루투스 버튼을 눌러보세요</div>
  </div>
</div>

<!-- 참조표 — 가로 스크롤 -->
<div class="ref-box">
  <div class="ref-hdr">⌨️ 키 매핑 참조표 — 가로로 스크롤하여 전체 확인</div>
  <div class="ref-scroll">
    <table class="ref-table" id="refTable">
      <thead>
        <tr>
          <th>#</th>
          <th>key</th>
          <th>code</th>
          <th>keyCode</th>
          <th>설명</th>
        </tr>
      </thead>
      <tbody id="refBody"></tbody>
    </table>
  </div>
</div>

<script>
// ── 참조표 ──────────────────────────────────
const KEYS = [
  {key:'Enter',      code:'Enter',                  kc:13,  desc:'엔터'},
  {key:'Escape',     code:'Escape',                 kc:27,  desc:'ESC'},
  {key:' ',          code:'Space',                  kc:32,  desc:'스페이스'},
  {key:'ArrowUp',    code:'ArrowUp',                kc:38,  desc:'위 방향키'},
  {key:'ArrowDown',  code:'ArrowDown',              kc:40,  desc:'아래 방향키'},
  {key:'ArrowLeft',  code:'ArrowLeft',              kc:37,  desc:'왼쪽 방향키'},
  {key:'ArrowRight', code:'ArrowRight',             kc:39,  desc:'오른쪽 방향키'},
  {key:'PageUp',     code:'PageUp',                 kc:33,  desc:'페이지 위'},
  {key:'PageDown',   code:'PageDown',               kc:34,  desc:'페이지 아래'},
  {key:'Home',       code:'Home',                   kc:36,  desc:'홈'},
  {key:'End',        code:'End',                    kc:35,  desc:'End'},
  {key:'Tab',        code:'Tab',                    kc:9,   desc:'탭'},
  {key:'Backspace',  code:'Backspace',              kc:8,   desc:'백스페이스'},
  {key:'Delete',     code:'Delete',                 kc:46,  desc:'삭제'},
  {key:'Insert',     code:'Insert',                 kc:45,  desc:'삽입'},
  {key:'F1',         code:'F1',                     kc:112, desc:'F1'},
  {key:'F2',         code:'F2',                     kc:113, desc:'F2'},
  {key:'F5',         code:'F5',                     kc:116, desc:'F5'},
  {key:'MediaPlayPause', code:'MediaPlayPause',     kc:179, desc:'재생/일시정지'},
  {key:'MediaStop',      code:'MediaStop',          kc:178, desc:'미디어 정지'},
  {key:'MediaTrackNext', code:'MediaTrackNext',     kc:176, desc:'다음 트랙'},
  {key:'MediaTrackPrevious','code':'MediaTrackPrevious',kc:177,desc:'이전 트랙'},
  {key:'AudioVolumeUp',  code:'VolumeUp',           kc:175, desc:'볼륨 증가'},
  {key:'AudioVolumeDown',code:'VolumeDown',         kc:174, desc:'볼륨 감소'},
  {key:'AudioVolumeMute',code:'VolumeMute',         kc:173, desc:'음소거'},
  {key:'a', code:'KeyA', kc:65, desc:'a 키'},
  {key:'b', code:'KeyB', kc:66, desc:'b 키'},
  {key:'c', code:'KeyC', kc:67, desc:'c 키'},
  {key:'d', code:'KeyD', kc:68, desc:'d 키'},
  {key:'e', code:'KeyE', kc:69, desc:'e 키'},
  {key:'f', code:'KeyF', kc:70, desc:'f 키'},
  {key:'0', code:'Digit0', kc:48, desc:'숫자 0'},
  {key:'1', code:'Digit1', kc:49, desc:'숫자 1'},
  {key:'2', code:'Digit2', kc:50, desc:'숫자 2'},
  {key:'3', code:'Digit3', kc:51, desc:'숫자 3'},
  {key:'4', code:'Digit4', kc:52, desc:'숫자 4'},
  {key:'5', code:'Digit5', kc:53, desc:'숫자 5'},
  {key:'6', code:'Digit6', kc:54, desc:'숫자 6'},
  {key:'7', code:'Digit7', kc:55, desc:'숫자 7'},
  {key:'8', code:'Digit8', kc:56, desc:'숫자 8'},
  {key:'9', code:'Digit9', kc:57, desc:'숫자 9'},
];

// 참조표 렌더
const refBody = document.getElementById('refBody');
KEYS.forEach((m,i) => {
  const tr = document.createElement('tr');
  tr.id = 'rr'+i;
  tr.innerHTML = `
    <td style="color:var(--muted);font-size:0.64rem">${i+1}</td>
    <td class="td-key">${m.key===' '?'[Space]':m.key}</td>
    <td class="td-code">${m.code}</td>
    <td class="td-kc">${m.kc}</td>
    <td style="color:var(--muted)">${m.desc}</td>`;
  refBody.appendChild(tr);
});

// ── 상태 ────────────────────────────────────
let capturing = false;
let logData = [], logSeq = 0;
let activeFilters = new Set(['keydown','keyup','input']);

// ── 캡처 토글 ────────────────────────────────
function toggleCapture() {
  capturing = !capturing;
  const btn = document.getElementById('toggleBtn');
  btn.className = 'toggle-btn ' + (capturing ? 'on' : 'off');
  btn.innerHTML = capturing
    ? '<span class="status-dot"></span>🟢 캡처 중 — BT 버튼을 눌러보세요'
    : '<span class="status-dot"></span>캡처 시작 (탭하여 활성화)';
  if(capturing) {
    // 입력창에 포커스
    setTimeout(() => document.getElementById('btInput').focus(), 100);
  }
}

// ── keyboard 이벤트 (capture:true — 최우선) ──
function onKey(e) {
  if(!capturing) return;
  if(!activeFilters.has(e.type)) return;

  // 기본 동작 차단
  e.preventDefault();
  e.stopImmediatePropagation();

  const key  = e.key   || '';
  const code = e.code  || '';
  const kc   = e.keyCode || 0;
  const wh   = e.which   || 0;

  processEvent(e.type, key, code, kc, wh, '');
}
['keydown','keyup','keypress'].forEach(t =>
  window.addEventListener(t, onKey, { capture:true })
);

// ── input 이벤트 — BT 장치가 텍스트만 보낼 때 ──
function onInputEvt(e) {
  if(!capturing) return;
  if(!activeFilters.has('input')) return;

  const val = e.data || e.target.value || '';
  // 입력창 비우기
  setTimeout(() => { e.target.value = ''; }, 0);

  if(!val) return;
  processEvent('input', val, '', 0, 0, val);
}

// ── 공통 처리 ────────────────────────────────
function processEvent(type, key, code, kc, wh, inputData) {
  // 매핑 검색
  const hits = KEYS.filter(m =>
    (key  && (m.key === key  || (m.key===' ' && key===' '))) ||
    (code && m.code === code) ||
    (kc   && m.kc   === kc)
  );
  const matched = hits.length > 0;

  // 디스플레이 업데이트
  setVal('dKey',   key      || '(없음)', matched);
  setVal('dCode',  code     || '(없음)', matched);
  setVal('dKC',    kc ? String(kc) : '—', matched);
  setVal('dWhich', wh ? String(wh) : '—', matched);
  setVal('dInput', inputData || '—', matched);
  setVal('dType',  type, matched);

  const mEl = document.getElementById('dMatch');
  if(matched) {
    mEl.innerHTML = `<span class="badge yes">✓ 일치 — ${hits.map(m=>m.key===' '?'[Space]':m.key).join(', ')}</span>`;
    hits.forEach(m => {
      const idx = KEYS.indexOf(m);
      const tr = document.getElementById('rr'+idx);
      if(tr){ tr.classList.remove('hit'); void tr.offsetWidth; tr.classList.add('hit'); tr.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    });
  } else {
    mEl.innerHTML = `<span class="badge no">⚠ 매핑 없음 — key:"${key||'?'}" code:"${code||'?'}" kc:${kc||'?'}</span>`;
  }

  // 로그 추가
  logSeq++;
  logData.unshift({ n:logSeq, type, key:key||inputData||'?', code:code||'input', kc, matched });
  renderLog();
}

// ── 유틸 ────────────────────────────────────
function setVal(id, val, matched) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'd-val';
  void el.offsetWidth;
  el.classList.add(matched ? 'fg' : 'fb');
}

function renderLog() {
  document.getElementById('logCnt').textContent = logData.length;
  const list = document.getElementById('logList');
  if(!logData.length) {
    list.innerHTML = '<div class="log-empty">캡처 ON 후 블루투스 버튼을 눌러보세요</div>';
    return;
  }
  list.innerHTML = logData.slice(0,100).map(d=>`
    <div class="log-item">
      <span class="l-n">#${d.n}</span>
      <span class="l-k">${d.key===' '?'[Sp]':d.key}</span>
      <span class="l-c">${d.code}</span>
      <span class="l-kc">${d.kc||'—'}</span>
      <span class="l-m ${d.matched?'y':'n'}">${d.matched?'✓':'—'}</span>
    </div>`).join('');
}

function clearLog() {
  logData = []; logSeq = 0; renderLog();
  ['dKey','dCode','dKC','dWhich','dInput','dType'].forEach(id => {
    document.getElementById(id).innerHTML = '<span style="color:var(--muted)">—</span>';
    document.getElementById(id).className = 'd-val';
  });
  document.getElementById('dMatch').innerHTML = '<span class="badge wait">대기 중</span>';
}

function toggleFilter(btn) {
  const t = btn.dataset.type;
  if(activeFilters.has(t)) activeFilters.delete(t);
  else activeFilters.add(t);
  btn.classList.toggle('on', activeFilters.has(t));
}
</script>
</body>
</html>
